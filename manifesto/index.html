<style>
  :root {
    color-scheme: light dark;
    --bg: white;
    --fg: black;

    --accent: black;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0b0b;
      --fg: #f5f5f5;
      --muted: rgba(255,255,255,0.55);
      --line: rgba(255,255,255,0.14);

    }
  }
  [data-theme="light"]    { --bg:#ffffff; --fg:#000000; --muted:rgba(0,0,0,0.55);   --line:rgba(0,0,0,0.12);    --accent:#000000; }
  [data-theme="dark"]     { --bg:#0b0b0b; --fg:#f5f5f5; --muted:rgba(255,255,255,0.55); --line:rgba(255,255,255,0.14); --accent:#f5f5f5; }
  [data-theme="sepia"]    { --bg:#f4ecd8; --fg:#3a2f1d; --muted:rgba(58,47,29,0.55);  --line:rgba(58,47,29,0.18);  --accent:#3a2f1d; }
  [data-theme="terminal"] { --bg:#000000; --fg:#00ff41; --muted:rgba(0,255,65,0.55);  --line:rgba(0,255,65,0.22);  --accent:#00ff41; }
  [data-theme="mandala"]  { --bg:#fdf6e3; --fg:#073642; --muted:rgba(7,54,66,0.55);   --line:rgba(7,54,66,0.15);   --accent:#cb4b16; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: ui-serif, Georgia, "Iowan Old Style", "Apple Garamond", serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── BODY ────────────────────────────────────────────────────────── */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(3rem, 12vw, 9rem) 1.6rem clamp(2rem, 6vw, 5rem);
  }

  .line1 {
    font-size: clamp(1.5rem, 3.5vw + 0.8rem, 2.8rem);
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.015em;
    margin: 0 0 0.8rem;
  }

  .line2 {
    font-size: clamp(1.5rem, 3.5vw + 0.8rem, 2.8rem);
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.015em;
    margin: 0 0 4rem;
  }

  .coda {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: clamp(0.78rem, 1vw + 0.5rem, 0.92rem);
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .coda a {
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px dotted var(--muted);
  }
  .coda a:hover { color: var(--fg); border-bottom-color: var(--fg); }

  /* ── FOOTER ──────────────────────────────────────────────────────── */
  footer {
    padding: 1.4rem 1.6rem 2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1.2em;
    flex-wrap: wrap;
    border-top: 1px solid var(--line);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 0.8em;
    color: var(--muted);
  }
  footer a {
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px dotted var(--muted);
  }
  footer a:hover { color: var(--fg); border-bottom-color: var(--fg); }
  footer .sep { opacity: 0.3; user-select: none; }

  ::selection { background: var(--accent); color: var(--bg); }
