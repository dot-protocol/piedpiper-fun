<style>
  :root {
    color-scheme: light dark;
    --bg: white;
    --fg: black;
    --muted: rgba(0,0,0,0.55);
    --line: rgba(0,0,0,0.12);
    --accent: black;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0b0b;
      --fg: #f5f5f5;
      --muted: rgba(255,255,255,0.55);
      --line: rgba(255,255,255,0.14);
      --accent: #f5f5f5;
    }
  }
  [data-theme="light"]    { --bg:#ffffff; --fg:#000000; --muted:rgba(0,0,0,0.55);   --line:rgba(0,0,0,0.12);    --accent:#000000; }
  [data-theme="dark"]     { --bg:#0b0b0b; --fg:#f5f5f5; --muted:rgba(255,255,255,0.55); --line:rgba(255,255,255,0.14); --accent:#f5f5f5; }
  [data-theme="sepia"]    { --bg:#f4ecd8; --fg:#3a2f1d; --muted:rgba(58,47,29,0.55);  --line:rgba(58,47,29,0.18);  --accent:#3a2f1d; }
  [data-theme="terminal"] { --bg:#000000; --fg:#00ff41; --muted:rgba(0,255,65,0.55);  --line:rgba(0,255,65,0.22);  --accent:#00ff41; }
  [data-theme="mandala"]  { --bg:#fdf6e3; --fg:#073642; --muted:rgba(7,54,66,0.55);   --line:rgba(7,54,66,0.15);   --accent:#cb4b16; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: ui-serif, Georgia, "Iowan Old Style", "Apple Garamond", serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── HERO ────────────────────────────────────────────────────────── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(3rem, 10vw, 7rem) 1.6rem clamp(2rem, 6vw, 4rem);
    gap: 0;
  }

  .wordmark {
    font-size: clamp(2.6rem, 7vw + 1rem, 5.2rem);
    font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1.08;
    margin: 0 0 1.1rem;
  }

  .tagline {
    font-size: clamp(1.1rem, 2vw + 0.5rem, 1.65rem);
    font-weight: 400;
    font-style: italic;
    color: var(--muted);
    margin: 0 0 2.8rem;
    line-height: 1.35;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 0.55em;
    padding: 0.9rem 1.6rem;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 1rem;
    letter-spacing: 0.04em;
    text-transform: lowercase;
    color: var(--bg);
    background: var(--accent);
    text-decoration: none;
    border-radius: 999px;
    transition: transform 80ms ease, opacity 120ms ease;
  }
  .cta:hover { transform: translateY(-1px); opacity: 0.88; }
  .cta .dot {
    width: 7px; height: 7px;
    background: var(--bg);
    border-radius: 999px;
    flex-shrink: 0;
  }

  /* ── FOOTER ──────────────────────────────────────────────────────── */
  footer {
    padding: 1.4rem 1.6rem 2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1.2em;
    flex-wrap: wrap;
    border-top: 1px solid var(--line);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 0.8em;
    color: var(--muted);
  }
  footer a {
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px dotted var(--muted);
  }
  footer a:hover { color: var(--fg); border-bottom-color: var(--fg); }
  footer .sep { opacity: 0.3; user-select: none; }

  ::selection { background: var(--accent); color: var(--bg); }
</style>

<script>
(function() {
  // Theme
  function applyTheme(k) {
    k === 'auto'
      ? document.body.removeAttribute('data-theme')
      : document.body.setAttribute('data-theme', k);
    try { localStorage.setItem('piedpiper-theme', k); } catch(e) {}
  }
  try { applyTheme(localStorage.getItem('piedpiper-theme') || 'auto'); } catch(e) {}

  // PostHog
  var btn = document.getElementById('cta-btn');
  if (btn) btn.addEventListener('click', function() {
    try { window.posthog && posthog.capture('download_clicked'); } catch(e) {}
  });
})();
</script>
