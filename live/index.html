/* ─── THEME TOKENS ────────────────────────────────────────────────────── */
:root {
  color-scheme: light dark;
  --bg:    white;
  --bg2:   #f7f7f7;
  --fg:    black;
  --muted: rgba(0,0,0,0.50);
  --dim:   rgba(0,0,0,0.28);
  --line:  rgba(0,0,0,0.10);
  --accent:black;
  --mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --serif: ui-serif,Georgia,"Iowan Old Style","Apple Garamond",serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#0b0b0b; --bg2:#111; --fg:#f2f2f2;
    --muted:rgba(255,255,255,0.50); --dim:rgba(255,255,255,0.28);
    --line:rgba(255,255,255,0.10); --accent:#f2f2f2;
  }
}

/* ─── RESET ───────────────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  background:var(--bg); color:var(--fg);
  font-family:var(--serif);
  font-size:clamp(14px,2vw,16px);
  line-height:1.65;
  min-height:100dvh;
}

/* ─── NAV ─────────────────────────────────────────────────────────────── */
nav {
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0.7rem 1.25rem;
  background:var(--bg); border-bottom:1px solid var(--line);

}
.nav-left { display:flex; align-items:center; gap:0.7rem; }
.nav-logo {
  font-family:var(--mono); font-size:0.78rem; font-weight:600;
  text-decoration:none; color:var(--fg); letter-spacing:0.04em;
}
.nav-logo span { opacity:0.38; }
.live-badge {

  border:1px solid var(--line); border-radius:999px; padding:0.18em 0.55em;
}

}
.nav-links { display:flex; gap:1rem; }
.nav-links a {

  text-decoration:none; letter-spacing:0.02em;
}
.nav-links a:hover { color:var(--fg); }

/* ─── MAIN ────────────────────────────────────────────────────────────── */
main {
  max-width:680px; margin:0 auto;
  padding:2.5rem 1.25rem 4rem;
}
h1 {
  font-family:var(--serif); font-size:clamp(1.1rem,3vw,1.3rem);

}

#feed { list-style:none; margin:0; padding:0; }

  align-items:baseline;
}
.entry:last-child { border-bottom:1px solid var(--line); }

.entry-time {

  white-space:nowrap; padding-top:0.08em;
}
.entry-body { min-width:0; }
.entry-title {

.entry-title a {
  color:inherit; text-decoration:none;

.entry-title a:hover { border-bottom-color:var(--accent); }
.entry-detail {

.entry-sha a {

.entry-sha a:hover { color:var(--fg); }
.entry-sha .sha-id {

.type-launch  { background:#c77; }

}

  &nbsp;&middot;&nbsp;
  auto-refreshes every 60s
</footer>

<script>
/* ─── helpers ─────────────────────────────────────────────────────────── */
function relTime(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const sec = Math.floor((Date.now() - d) / 1000);
  if (sec < 60)        return 'just now';
  if (sec < 3600)      return Math.floor(sec/60) + 'm ago';
  if (sec < 86400)     return Math.floor(sec/3600) + 'h ago';
  if (sec < 86400*30)  return Math.floor(sec/86400) + 'd ago';
  if (sec < 86400*365) return Math.floor(sec/86400/30) + 'mo ago';
  return Math.floor(sec/86400/365) + 'y ago';
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── render ──────────────────────────────────────────────────────────── */
function renderCurated(ev) {
  const type = ev.type || 'note';
  const timeStr = relTime(ev.ts);
  const titleHtml = ev.url
    ? `<a href="${esc(ev.url)}" target="_blank" rel="noopener">${esc(ev.title)}</a>`
    : esc(ev.title);
  const bodyHtml = ev.body ? `<p class="entry-detail">${esc(ev.body)}</p>` : '';
  return `
<li class="entry" data-ts="${esc(ev.ts)}">
  <span class="entry-time">${esc(timeStr)}</span>
  <div class="entry-body">
    <span class="entry-title">
      <span class="type-dot type-${esc(type)}"></span>${titleHtml}
    </span>
    ${bodyHtml}
  </div>
</li>`;
}

function renderCommit(c) {
  const sha  = esc(c.sha.slice(0,7));
  const date = c.commit.author.date;
  const timeStr = relTime(date);
  // Strip internal prefixes (wip:, chore: scratch, [internal])
  const rawMsg = c.commit.message.split('\n')[0];
  const skipRe = /^(wip:|chore:\s*scratch|\[internal\])/i;
  if (skipRe.test(rawMsg)) return '';
  const msg  = esc(rawMsg);
  const url  = `https://github.com/dot-protocol/pipernet/commit/${c.sha}`;
  return `
<li class="entry" data-ts="${esc(date)}">
  <span class="entry-time">${esc(timeStr)}</span>
  <div class="entry-body entry-sha">
    <span class="type-dot type-commit"></span>
    <a href="${url}" target="_blank" rel="noopener">
      <span class="sha-id">${sha}</span>${msg}
    </a>
  </div>
</li>`;
}

/* ─── fetch + merge ───────────────────────────────────────────────────── */
async function load() {
  const feed   = document.getElementById('feed');
  const status = document.getElementById('status');

  let curated = [];
  let commits  = [];

  try {
    const r = await fetch('/data/events.json', { cache: 'no-store' });
    if (r.ok) {
      const j = await r.json();
      curated = j.events || [];
    }
  } catch(e) { /* static file may 404 before first deploy — silent */ }

  try {
    const r = await fetch(
      'https://api.github.com/repos/dot-protocol/pipernet/commits?per_page=30',
      { headers: { 'Accept': 'application/vnd.github.v3+json' } }
    );
    if (r.ok) commits = await r.json();
  } catch(e) { /* GitHub API rate-limit or network — degrade gracefully */ }

  // Merge into a single list, newest first
  const all = [
    ...curated.map(e => ({ ts: e.ts, _type: 'curated', _data: e })),
    ...commits
      .filter(c => c && c.commit && c.commit.author)
      .map(c => ({ ts: c.commit.author.date, _type: 'commit', _data: c }))
  ].sort((a, b) => new Date(b.ts) - new Date(a.ts));

  if (all.length === 0) {
    status.textContent = 'the feed is quiet. read the spec.';
    return;
  }

  status.textContent = '';
  let html = '';
  for (const item of all) {
    if (item._type === 'curated') html += renderCurated(item._data);
    else                          html += renderCommit(item._data);
  }
  feed.innerHTML = html;
}

/* ─── init + auto-refresh ─────────────────────────────────────────────── */
load();
setInterval(load, 60_000);
</script>
